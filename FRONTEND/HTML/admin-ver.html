<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ver productos</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Tus estilos -->
  <link rel="stylesheet" href="../CSS/nav-footer.css">
  <link rel="stylesheet" href="../CSS/admin-ver.css">
</head>

<body>

<main class="py-4 py-md-5">
  <div class="container">

    <!-- HEADER -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
      <h1 class="mb-0">Productos</h1>

      <div class="d-flex gap-2">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar producto...">
        <a href="admin-crear.html" class="btn btn-outline-info">
          <i class="bi bi-plus-lg"></i>
        </a>
      </div>
    </div>

    <!-- TABLA -->
    <div class="table-responsive d-none d-md-block">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>Imagen</th>
            <th>ID</th>
            <th>Nombre</th>
            <th>Marca</th>
            <th>Stock</th>
            <th>Precio</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tablaProductos"></tbody>
      </table>
    </div>

    <!-- CARDS (MÓVIL) -->
    <div class="d-md-none" id="cardsProductos"></div>

    <!-- PAGINACIÓN -->
    <nav class="mt-4 d-flex justify-content-center">
      <ul class="pagination" id="paginacion"></ul>
    </nav>

  </div>
</main>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/admin-ver.js"></script>

</body>
</html>
