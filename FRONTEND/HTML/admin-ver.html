<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
  <!--link de fuente de h2-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="16x16" href="../images/klydy-favicon-32.png">
  <link rel="stylesheet" href="../CSS/admin-ver.css">
  <link rel="stylesheet" href="../CSS/nav-footer.css">
  <title>Gestión</title>
</head>

<body>

<main class="py-4 py-md-5">
  <div class="container">

    <!-- HEADER -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
      <h1 class="mb-0">Gestión de productos</h1>

      <div class="d-flex gap-2">
        <input type="text" id="buscador" class="form-control" placeholder="Buscar producto...">
        <a href="admin-crear.html" class="btn btn-outline-info">
          <i class="bi bi-plus-lg"></i>
        </a>
      </div>
    </div>

    <!-- TABLA -->
    <div class="table-responsive d-none d-md-block">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>Imagen</th>
            <th>ID</th>
            <th>Nombre</th>
            <th>Marca</th>
            <th>Stock</th>
            <th>Precio</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tablaProductos"></tbody>
      </table>
    </div>

    <!-- CARDS (MÓVIL) -->
    <div class="d-md-none" id="cardsProductos"></div>

    <!-- PAGINACIÓN -->
    <nav class="mt-4 d-flex justify-content-center">
      <ul class="pagination" id="paginacion"></ul>
    </nav>

  </div>
</main>

<!-- MODAL ELIMINAR PRODUCTO  -->
 <div id="modalEliminar" class="modal-overlay d-none">
  <div class="modal-content-neon">

    <h2>Eliminar producto</h2>

    <p id="modalEliminarMensaje">
      ¿Seguro que deseas eliminar este producto?
    </p>

    <div class="modal-actions">
      <button id="btnCancelarEliminar" class="btn-secundario">
        Cancelar
      </button>

      <button id="btnConfirmarEliminar" class="btn-danger">
        Eliminar
      </button>
    </div>

  </div>
</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../JS/admin-ver.js"></script>

</body>
</html>
